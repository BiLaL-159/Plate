version: '3.9'
services:
  mongodb:
    image: mongo:7
    container_name: plate-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plate-backend
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/plate
      JWT_SECRET: dev-secret
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '5001:5001'
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plate-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5001
    ports:
      - '8080:8080'
    depends_on:
      - backend

volumes:
  mongo-data:
